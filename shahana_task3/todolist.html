<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elixer To-Do Lister</title>

    <header>
        <h1> Elixer To-Do Lister </h1>
    </header>

<body>

<div class="main-layout">
   
    <div class="task_container">
     <h3>Enter your tasks</h3>
     <input type="text" id="taskInput" placeholder="Enter task - discription">
     <button type="button" id="addBt" class="add">Add</button>
    </div>

    <div class="right-column">

        <div class="incom_container">
            <h3>Incomplete tasks</h3>
            <ul id="incompleteTasks"></ul>
        </div>
        
        <div class="com_container">
            <h3>Completed tasks</h3>
            <ul id="completedTasks"></ul>
        </div>
          
    </div>
</div>

<script src="script.js"></script>

</body>
</html>


<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">


<style>

header
{
    background-color: #061124;
    color: #ffffff;
    text-align: center;
    padding: 24px;
    width: 100%;
    box-sizing: border-box;
}

footer {
    color: #cbd5e1;
    text-align: center;
    padding: 20px;
    width: 100%;
    background: #040c18;
    margin-top: 32px;
    font-size: 1rem;
    box-sizing: border-box;
}

.task_container h3, 
.incom_container h3, 
.com_container h3
{
    margin: 0; 
    font-weight: bold;
    color: #ffffff; 
    font-family: 'Playfair Display', serif; 
    margin-bottom: 10px;
    letter-spacing: 1px;
    margin-left: 155px;
}

input[type="text"] 
{
    font-family: 'Playfair Display', serif; 
    background: #e2eefd;
    letter-spacing: 1px;
    padding: 10px;
    margin-left: 20px;
    border-radius: 6px;
    border: none;
    cursor: text;
    box-shadow: 0 6px 10px rgba(0,0,0,0.1);
    box-sizing: border-box;
    width: 400px;
    
}

.main-layout 
{ 
    display: flex;
    align-items: flex-start;
    gap: 70px; 
    padding: 50px 60px; 
    color: aliceblue;
}

.right-column 
{
    display: flex;
    flex-direction: column;
    gap: 30px; 
}

.task_container
{
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    width: 500px;
    flex-shrink: 0;
    background: linear-gradient(to right, #092d56, #0c325c);
    color: #2b2d30;
    line-height: 1.7;
    height: 200px;
}

button[type="button"] 
{
    font-family: 'Playfair Display', serif; 
    background: #061124;
    letter-spacing: 1px;
    padding: 10px;
    margin-right: 8px;
    margin-left: 6px;
    border-radius: 6px;
    border: none;
    cursor: text;
    box-shadow: 0 6px 10px rgba(0,0,0,0.1);
    box-sizing: border-box;
    padding: 10px 15px;
    background-color: #091428;
    cursor: pointer;
    color: #e2e8f0;
}

.incom_container
{
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    width: 450px;
    flex-shrink: 0;
    background: linear-gradient(to right, #092d56, #0c325c);
    color: #2b2d30;
    line-height: 1.7;
    height: fit-content;
}

.com_container
{
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    width: 450px;
    flex-shrink: 0;
    background: linear-gradient(to right, #092d56, #0c325c);
    color: #2b2d30;
    line-height: 1.7;
    height: fit-content;
}

body
{
    background: radial-gradient(circle, #061d37, #061124);
    margin: 0%;
}

button:hover {
    background-color: #0c1b42;
}

ul {
    list-style-type: none;
    padding-left: 0;
}

.task-item {
    background: #e2eefd;
    padding: 10px;
    margin-top: 5px;
    border-left: 6px solid #0e1c32; 
    border-radius: 6px;
    height: 20px;
}

.delete-btn:hover {
    background: #e2eefd;

}

li {
    display: flex;
    align-items: center;
    gap: 12px; 
}

li button, li .delete-btn, li :last-child {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    margin-left: auto; 
}

input[type="checkbox"] {
    accent-color: #00bcd4; 
    transform: scale(1.2);
    cursor: pointer;
}

</style>

<footer>
    <p>created by Shahana</p> 
</footer>
